name: Build KMP Notes iOS (IPA for AltStore)

# Runs on every push to master/main, OR manually via the Actions tab on GitHub
on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Show Xcode and SDK versions
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          swift --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Archive KMP Notes iOS
        run: |
          set -o pipefail
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/KMPNotes.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_VERSION=5 \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            MARKETING_VERSION="1.0.${{ github.run_number }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            2>&1 | tee "$RUNNER_TEMP/build.log" || {
            echo "════════════════════════════════════════════"
            echo "  BUILD FAILED — SWIFT / CLANG ERRORS:"
            echo "════════════════════════════════════════════"
            grep ": error:" "$RUNNER_TEMP/build.log" || echo "(no ': error:' lines matched)"
            exit 1
          }

      - name: Show build errors (if any)
        if: failure()
        run: |
          echo "══════════ SWIFT / CLANG ERROR LINES ══════════"
          grep -n ": error:" "$RUNNER_TEMP/build.log" | head -80 || echo "(no lines found)"
          echo "══════════ LAST 300 LINES OF BUILD LOG ══════════"
          tail -300 "$RUNNER_TEMP/build.log"

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ runner.temp }}/build.log
          retention-days: 7

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          # Typically, PRODUCT_NAME = Notes, making it Notes.app, but fallback to *.app just in case
          cp -r "$RUNNER_TEMP/KMPNotes.xcarchive/Products/Applications/"*.app \
                "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r "KMP-Notes-iOS.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: KMP-Notes-iOS
          path: ${{ runner.temp }}/ipa/KMP-Notes-iOS.ipa
          retention-days: 14

      - name: Generate apps.json
        run: |
          IPA_PATH="$RUNNER_TEMP/ipa/KMP-Notes-iOS.ipa"
          IPA_SIZE=$(stat -f%z "$IPA_PATH")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="1.0.${{ github.run_number }}"
          
          cat <<EOF > "$RUNNER_TEMP/apps.json"
          {
            "name": "Reess KMP Notes Repository",
            "identifier": "com.reesskennedy.kmpnotes.source",
            "apps": [
              {
                "name": "KMP Notes",
                "bundleIdentifier": "orgIdentifier.iosApp",
                "developerName": "Reess Kennedy",
                "version": "$VERSION",
                "versionDate": "$DATE",
                "versionDescription": "Automated build from GitHub Actions",
                "downloadURL": "https://github.com/ReessKennedy/KMP-Notes-App/releases/download/latest/KMP-Notes-iOS.ipa",
                "localizedDescription": "KMP Notes iOS sideloaded via AltStore.",
                "iconURL": "https://raw.githubusercontent.com/ReessKennedy/KMP-Notes-App/master/iosApp/iosApp/Assets.xcassets/AppIcon.appiconset/1024.png",
                "tintColor": "0180FF",
                "size": $IPA_SIZE
              }
            ]
          }
          EOF

      - name: Update latest tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa latest -m "Update latest tag"
          git push -f origin latest

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Automated rolling release for AltStore updates. Copy the apps.json link below into AltStore Sources."
          files: |
            ${{ runner.temp }}/ipa/KMP-Notes-iOS.ipa
            ${{ runner.temp }}/apps.json
